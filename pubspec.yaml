name: traum
description: "TRAUM — Dein persönliches Dashboard"
publish_to: 'none'

version: 0.7.6+55

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Datenbank
  drift: ^2.20.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Preferences
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Gesundheit
  health: ^13.1.4

  # Kalender Sync
  device_calendar: ^4.3.2

  # Charts
  fl_chart: ^0.69.0

  # Benachrichtigungen
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Background Tasks
  workmanager: ^0.9.0

  # Homescreen Widgets
  home_widget: ^0.6.0

  # Biometrie
  local_auth: ^2.3.0

  # HTTP
  http: ^1.2.2

  # Animationen
  lottie: ^3.1.2

  # GPS
  geolocator: ^12.0.0

  # Teilen
  share_plus: ^10.0.0

  # Archiv
  archive: ^3.6.0

  # Datei-Auswahl (Vault-Import)
  file_picker: ^8.1.2

  # Links
  url_launcher: ^6.3.0

  # App-Info
  package_info_plus: ^8.0.0

  # Bilder
  image_picker: ^1.1.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3

  # Barcode-Scanner
  mobile_scanner: ^5.2.3

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Datei öffnen
  open_file: ^3.3.2

  # Kalender UI
  table_calendar: ^3.1.2

  # SVG
  flutter_svg: ^2.0.10+1

  # Gerätinfos
  device_info_plus: ^10.1.0

  # Verbindung
  connectivity_plus: ^6.1.0

  # Markdown (flutter_markdown ist eingestellt; flutter_markdown_plus ist der
  # aktiv gepflegte Nachfolger mit kompatibler API. LaTeX über die _latex-
  # Erweiterung, Mathe-Rendering über flutter_math_fork.)
  flutter_markdown_plus: ^1.0.3
  flutter_markdown_plus_latex: ^1.0.1
  markdown: ^7.2.1
  flutter_math_fork: ^0.7.3

  # YAML (Frontmatter-Parsing für Notiz-Properties)
  yaml: ^3.1.2

  # Graph View (kraftgerichteter Graph für Notiz-Verlinkungen)
  graphview: ^1.2.0

  # i18n
  intl: ^0.20.0

  # Permissions
  permission_handler: ^11.3.1

  # Screen Keep-Awake
  wakelock_plus: ^1.3.0

  # Icons
  cupertino_icons: ^1.0.8

  # App-Launcher (experimentell, Android): installierte Apps auflisten/starten
  installed_apps: ^2.1.1

  # Graffiti Map — Karte, Marker-Clustering, Geo, EXIF, Export
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0
  geocoding: ^3.0.0
  exif: ^3.3.0
  image: ^4.2.0
  gpx: ^2.2.2
  flutter_map_location_marker: ^9.0.0
  flutter_map_cache: ^2.1.0
  dio_cache_interceptor: ^4.0.6
  http_cache_file_store: ^2.0.1
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.20.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#0D0D1A"
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/exercises/
    - assets/exercises/icons/
    - assets/supplements/
    - assets/svg/
    - assets/legal/
    - assets/lottie/
    - assets/substances.json
    - assets/substances.db
    - assets/data/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
